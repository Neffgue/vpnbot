# Alembic Configuration File

[alembic]
# path to migration scripts
sqlalchemy.url = postgresql://user:password@localhost/dbname
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to be used by the `timestamp()` function within the migration file
# when the revision metadata is updated prior to the commit() call.
# leave empty for localtime
# timezone =

# max length of characters to apply to the
# "slug" field of the migration file (affects
# the length of the file name as well as the generated migration class name)
# by default this is unlimited, allowing for the very long names that
# sqlalchemy might generate for its constraints
# if the length is set to lower than 10, then the generated name of the
# migration files will have the same character length as db_branch_name
# if otherwise not set.

sqlalchemy_echo = false

# the output encoding used when revision files are generated
output_encoding = utf-8

sqlalchemy.future = true

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
