# VPN Sales System — полный стек
# Запуск: docker-compose up -d --build
# Логи:   docker-compose logs -f backend
# Стоп:   docker-compose down

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vpn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpn_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vpn_network

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vpn_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vpn_network

  # ── Backend (FastAPI) ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vpn_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-vpn_system}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./static:/app/static
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    networks:
      - vpn_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Telegram Bot ────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: vpn_bot
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-vpn_system}
      REDIS_URL: redis://redis:6379/0
      API_BASE_URL: http://backend:8000/api/v1
    volumes:
      - ./bot:/app/bot
      - ./static:/app/static
    networks:
      - vpn_network

  # ── Celery Worker ────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: vpn_worker
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-vpn_system}
      REDIS_URL: redis://redis:6379/0
      C_FORCE_ROOT: "true"
    volumes:
      - ./worker:/app/worker
      - ./backend:/app/backend
    networks:
      - vpn_network

  # ── Celery Beat (планировщик) ────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: vpn_beat
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-vpn_system}
      REDIS_URL: redis://redis:6379/0
      C_FORCE_ROOT: "true"
    volumes:
      - ./worker:/app/worker
      - ./backend:/app/backend
    networks:
      - vpn_network
    command: ["celery", "-A", "worker.celery_app", "beat", "--loglevel=info"]

  # ── Nginx (reverse proxy + admin panel static) ──────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vpn_nginx
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./static:/static:ro
      - ./admin-panel/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    networks:
      - vpn_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vpn_network:
    driver: bridge
